<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Content Filter</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card panel">
        <p id="spendLabel" class="label">Estimated Spend</p>
        <p id="estSpend" class="value">$0.0000</p>
        <p id="usageLine" class="meta"></p>
        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="openOptionsBtn" class="secondary" type="button">Options</button>
        </div>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
