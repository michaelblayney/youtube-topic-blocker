<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Topic Blocker</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>YouTube Topic Blocker</h1>
      <p id="runtimeStatus" class="runtime"></p>
      <div class="card">
        <p class="label">Estimated Spend</p>
        <p id="estSpend" class="value">$0.0000</p>
        <p id="usageLine" class="meta"></p>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
